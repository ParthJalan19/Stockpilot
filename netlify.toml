[build]
  publish = "frontend"

# Netlify Path Rewriting & Routing
[[redirects]]
  from = "/"
  to = "/landing/index.html"
  status = 200

[[redirects]]
  from = "/features"
  to = "/landing/features.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/landing/pricing.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/landing/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/landing/contact.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app/login.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://stockpilot-jgwn.onrender.com/api/:splat"
  status = 200
  force = true
