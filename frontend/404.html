<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | StockPilot</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-primary);">

  <div class="premium-card" style="text-align: center; max-width: 440px; padding: 40px; box-shadow: var(--shadow-premium);">
    <div style="background: rgba(239, 68, 68, 0.1); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--danger); margin: 0 auto 24px;">
      <i data-lucide="alert-octagon" style="width:32px; height:32px;"></i>
    </div>
    <h1 style="font-size: 2.2rem; margin-bottom: 12px; font-family: var(--font-headings);">404 Error</h1>
    <h3 style="font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 20px;">The requested page could not be located.</h3>
    <p style="color: var(--text-tertiary); font-size: 0.875rem; margin-bottom: 30px;">Make sure the URL is spelled correctly or that the system resources have not been archived.</p>
    
    <div style="display:flex; flex-direction:column; gap:10px;">
      <a href="/app/dashboard.html" class="btn btn-primary"><i data-lucide="layout-dashboard"></i> Go to Dashboard</a>
      <a href="/" class="btn btn-secondary"><i data-lucide="home"></i> Home Website</a>
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
